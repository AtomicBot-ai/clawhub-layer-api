services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: clawhub-layer

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
      - ./nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://mongodb:27017/clawhub-layer
      CONVEX_CLOUD_URL: https://wry-manatee-359.convex.cloud
      CONVEX_SITE_URL: https://wry-manatee-359.convex.site
      SYNC_INTERVAL_MINUTES: "60"
      PORT: "3000"

volumes:
  mongo-data:
