services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: clawhub-layer

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/clawhub-layer
      CONVEX_CLOUD_URL: https://wry-manatee-359.convex.cloud
      CONVEX_SITE_URL: https://wry-manatee-359.convex.site
      SYNC_CRON: "0 3 * * *"
      PORT: "3000"

volumes:
  mongo-data:
